name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the HACS ZIP asset to"
        required: true

permissions:
  contents: write

jobs:
  hacs-zip:
    name: HACS ZIP
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Build HACS ZIP
        run: python scripts/package_hacs_release.py --output nice_bidiwifi.zip

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" nice_bidiwifi.zip --clobber
